name: Deploy VitePress

on:
  push:
    tags:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RELEASE_ASSET: site-docs-dist.tar.gz
      DEPLOY_TAG: deploy-${{ github.run_id }}-${{ github.run_attempt }}
      DEPLOY_TARGET: /var/www/main/dist

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run docs:build

      - name: Verify build output
        run: |
          test -f docs/.vitepress/dist/index.html
          test -d docs/.vitepress/dist/assets

      - name: Pack build output
        run: |
          printf '%s\n' "${GITHUB_SHA}" > docs/.vitepress/dist/.deploy-sha
          tar -czf "${RELEASE_ASSET}" -C docs/.vitepress/dist .
          sha256sum "${RELEASE_ASSET}" > "${RELEASE_ASSET}.sha256"
          tar -tzf "${RELEASE_ASSET}" >/dev/null
          ls -lh "${RELEASE_ASSET}" "${RELEASE_ASSET}.sha256"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${DEPLOY_TAG}" \
            "${RELEASE_ASSET}" \
            "${RELEASE_ASSET}.sha256" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "Site Docs Deploy ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}" \
            --notes "Automated deployment package for ${GITHUB_SHA}." \
            --latest

      - name: Pull release on server and update site
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -eu

            ASSET="${{ env.RELEASE_ASSET }}"
            DEPLOY_TAG="${{ env.DEPLOY_TAG }}"
            DEPLOY_TARGET="${{ env.DEPLOY_TARGET }}"
            REPO="${{ github.repository }}"

            case "${DEPLOY_TARGET}" in
              ""|"/")
                echo "Invalid DEPLOY_TARGET: ${DEPLOY_TARGET}" >&2
                exit 1
                ;;
            esac

            TMP_DIR="$(mktemp -d)"
            cleanup() {
              rm -rf "${TMP_DIR}"
            }
            trap cleanup EXIT

            RELEASE_PATH="${REPO}/releases/download/${DEPLOY_TAG}/${ASSET}"
            DOWNLOAD_URLS="
            https://gh.felicity.ac.cn/https://github.com/${RELEASE_PATH}
            https://kkgithub.com/${RELEASE_PATH}
            https://gh.927223.xyz/https://github.com/${RELEASE_PATH}
            https://github.com/${RELEASE_PATH}
            "

            download_one() {
              url="$1"
              output="$2"

              if command -v curl >/dev/null 2>&1; then
                if command -v timeout >/dev/null 2>&1; then
                  timeout 120s curl -fL --connect-timeout 20 --max-time 120 --retry 2 --retry-delay 2 --retry-connrefused -o "${output}" "${url}"
                else
                  curl -fL --connect-timeout 20 --max-time 120 --retry 2 --retry-delay 2 --retry-connrefused -o "${output}" "${url}"
                fi
              elif command -v timeout >/dev/null 2>&1; then
                timeout 120s wget --timeout=120 --tries=2 -O "${output}" "${url}"
              else
                wget --timeout=120 --tries=2 -O "${output}" "${url}"
              fi
            }

            download_release_files() {
              for DOWNLOAD_URL in ${DOWNLOAD_URLS}; do
                SHA256_URL="${DOWNLOAD_URL}.sha256"

                echo "Download release package from ${DOWNLOAD_URL}"
                rm -f "${TMP_DIR}/${ASSET}" "${TMP_DIR}/${ASSET}.sha256"

                if download_one "${DOWNLOAD_URL}" "${TMP_DIR}/${ASSET}" && \
                   download_one "${SHA256_URL}" "${TMP_DIR}/${ASSET}.sha256"; then
                  return 0
                fi

                echo "Download failed from ${DOWNLOAD_URL}, trying next source..." >&2
              done

              echo "Failed to download release package from all sources." >&2
              return 1
            }

            download_release_files

            cd "${TMP_DIR}"
            sha256sum -c "${ASSET}.sha256"

            mkdir -p site "${DEPLOY_TARGET}"
            tar -xzf "${ASSET}" -C site

            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete site/ "${DEPLOY_TARGET}/"
            else
              find "${DEPLOY_TARGET}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              cp -a site/. "${DEPLOY_TARGET}/"
            fi

            echo "Updated ${DEPLOY_TARGET} to $(cat "${DEPLOY_TARGET}/.deploy-sha")"
